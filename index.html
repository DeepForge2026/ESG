<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DeepForge ESG — Diagnóstico e Monitoramento com IA</title>

<style>
  :root {
    --verde:#1D9E75; --verde-esc:#0f6e56; --verde-claro:#f0faf6;
    --ambar:#EF9F27; --ambar-esc:#96600a; --ambar-claro:#fffbf0;
    --azul:#378ADD; --azul-esc:#1550a0; --azul-claro:#eef4ff;
    --roxo:#7F77DD; --roxo-esc:#534AB7;
    --verm:#E24B4A; --verm-esc:#c0302f; --verm-claro:#fff0f0;
    --tinta:#1a1a18; --cinza:#888; --cinza-claro:#aaa;
    --borda:#e8e8e4; --fundo:#f7f7f4; --branco:#fff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter','Helvetica Neue',Arial,sans-serif; background: var(--fundo); color: var(--tinta); min-height: 100vh; }
  input, select, textarea, button { font-family: inherit; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { width:40px; height:40px; border-radius:50%; border:3px solid rgba(29,158,117,.2); border-top-color:var(--verde); animation:spin 1s linear infinite; }
  .spin-sm { width:28px; height:28px; border-radius:50%; border:3px solid rgba(29,158,117,.2); border-top-color:var(--verde); animation:spin 1s linear infinite; }
  .hidden { display: none !important; }

  .wrap-form { max-width: 720px; margin: 0 auto; padding: 24px 20px; }
  .eyebrow { font-size:10px; font-weight:700; color:var(--verde); letter-spacing:.1em; text-transform:uppercase; margin-bottom:4px; }
  .h1 { font-size:20px; font-weight:800; color:var(--tinta); margin-bottom:4px; }
  .sub { font-size:12px; color:var(--cinza-claro); }
  .sec { background:var(--branco); border:1px solid var(--borda); border-radius:12px; padding:20px; margin-bottom:14px; }
  .sec-label { font-size:10px; font-weight:700; color:var(--cinza-claro); text-transform:uppercase; letter-spacing:.06em; margin:0 0 12px; display:flex; align-items:center; gap:8px; }

  .field { display:flex; flex-direction:column; gap:5px; }
  .field label { font-size:11px; font-weight:600; color:#666; }
  .field .hint { font-size:10px; color:#bbb; }
  input, select, textarea { font-size:13px; padding:8px 10px; border:1px solid #e0e0da; border-radius:8px; background:#fafaf8; color:var(--tinta); outline:none; width:100%; }

  .btn-primary { width:100%; background:var(--verde); color:#fff; border:none; border-radius:10px; padding:14px; font-size:14px; font-weight:800; cursor:pointer; }
  .btn-demo { font-size:11px; font-weight:700; padding:6px 12px; border-radius:7px; border:1px dashed rgba(55,138,221,.5); background:var(--azul-claro); color:var(--azul-esc); cursor:pointer; margin-bottom:18px; }

  .btn-add { font-size:11px; font-weight:700; color:var(--verde); background:transparent; border:1px dashed rgba(29,158,117,.5); border-radius:7px; padding:6px 14px; cursor:pointer; margin-top:4px; }


  /* Dashboard */
  .header { background:#111; padding:14px 20px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; }
  .header .co { font-size:15px; font-weight:700; color:#fff; }
  .header .meta { font-size:11px; color:#666; margin-top:1px; }
  .header .score-lbl { font-size:10px; color:#666; }
  .header .score-val { font-size:28px; font-weight:800; line-height:1; }
  .btn-dark { font-size:11px; font-weight:700; padding:7px 12px; border-radius:7px; border:1px solid #333; background:transparent; color:#aaa; cursor:pointer; }
  .btn-save { font-size:11px; font-weight:700; padding:7px 12px; border-radius:7px; border:none; background:#2a2a2a; color:#ccc; cursor:pointer; }
  .tabs { background:var(--branco); border-bottom:1px solid var(--borda); padding:0 20px; display:flex; overflow-x:auto; }
  .tab { padding:10px 14px; font-size:12px; font-weight:500; color:var(--cinza); background:transparent; border:none; border-bottom:2px solid transparent; cursor:pointer; white-space:nowrap; }
  .tab.active { font-weight:700; color:var(--verde); border-bottom-color:var(--verde); }
  .panel { padding:18px 20px; max-width:1000px; margin:0 auto; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:10px; margin-bottom:14px; }
  .card { background:var(--branco); border:1px solid var(--borda); border-radius:12px; padding:14px 16px; }
  .card .lbl { font-size:10px; font-weight:600; color:var(--cinza-claro); text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px; }
  .card .val { font-size:20px; font-weight:800; }

  .card .sub { font-size:11px; color:var(--cinza-claro); }
  .box { background:var(--branco); border:1px solid var(--borda); border-radius:12px; padding:16px; }
  .tag { font-size:10px; font-weight:700; padding:2px 7px; border-radius:4px; white-space:nowrap; display:inline-block; }
  .tag.crit { background:var(--verm-claro); color:var(--verm-esc); border:.5px solid rgba(192,48,47,.25); }
  .tag.gap { background:var(--azul-claro); color:var(--azul-esc); border:.5px solid rgba(21,80,160,.25); }
  .tag.atenc { background:var(--ambar-claro); color:var(--ambar-esc); border:.5px solid rgba(150,96,10,.25); }

  table { width:100%; border-collapse:collapse; font-size:12px; }

  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.45); display:flex; align-items:center; justify-content:center; padding:20px; z-index:50; }

// ─── UTILIDADES ──────────────────────────────────────────────────────────────
const esc = (s) => String(s==null?"":s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const slug = (s) => (s||"empresa").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"").slice(0,40);
const hoje = () => new Date().toISOString().slice(0,10);
const fmtData = (iso) => { try { return new Date(iso+"T12:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"short",year:"numeric"}); } catch { return iso; } };
const scoreColor = (s) => s>=70?C.verde:s>=50?C.ambar:C.verm;

// ─── CÁLCULO DE CONFORMIDADE ─────────────────────────────────────────────────
function calcularConformidade(d, a) {
  const resClass = a.residuosClassificados || [];
  const temMTR = resClass.some(r => r.mtr);
  const temResiduoSemMTR = resClass.some(r => !r.mtr && (r.classe==="Classe I" || r.classe==="Classe II-A"));
  const temPerigoso = resClass.some(r => r.classe==="Classe I");

  return CONFORMIDADE_BASE.map(base => {
    let status="verificar", obs="";
    switch (base.id) {
      case "pnrs": status="verificar"; obs="Empresas geradoras de resíduos devem manter PGRS atualizado."; break;
      case "mtr":
        if (temResiduoSemMTR) { status="risco"; obs="Há resíduos perigosos sem MTR emitido — risco de autuação pelo INEA."; }
        else if (temMTR) status="ok"; else status="verificar";
        break;
      case "licenca":
        if (d.licenca==="valida") status="ok";
        else if (d.licenca==="vencida") { status="risco"; obs="Operar sem licença válida é infração ambiental grave."; }
        else if (d.licenca==="vencendo") { status="risco"; obs="Licença vencendo — iniciar renovação com 120 dias de antecedência (Res. CONAMA 237)."; }
        else if (d.licenca==="nao") { status="risco"; obs="Atividade industrial sem licença ambiental."; }
        break;
      case "abnt": status = resClass.length>0 && resClass.every(r=>r.classe) ? "ok" : "verificar"; break;
      case "lgpd":
        if (d.lgpd==="sim") status="ok";
        else if (d.lgpd==="parcial") { status="verificar"; obs="Política LGPD em elaboração — formalizar para fortalecer o pilar Governança."; }
        else status="verificar";
        break;
      case "outorga":
        if (d.captaAgua==="sim") { status="verificar"; obs="Capta água — verificar necessidade de outorga junto ao INEA/ANA."; }
        else status="ok";
        break;
      case "efluentes": status = temPerigoso ? "verificar" : "ok"; break;
      case "atmosf": status = (d.comb && d.comb!=="nenhum") ? "verificar" : "ok"; break;
    }
    return { ...base, status, obs };
  });
}

// ─── CÁLCULO DE DOCUMENTOS ───────────────────────────────────────────────────
function calcularDocumentos(d, a) {
  const docs = [];
  const addDias = (n) => { const dt=new Date(); dt.setDate(dt.getDate()+n); return dt.toISOString().slice(0,10); };
  if (d.licenca==="valida") docs.push({nome:"Licença de Operação (LO)",tipo:"Licença ambiental · INEA",vencimento:addDias(400),dias:400,status:"ativo"});
  else if (d.licenca==="vencendo") docs.push({nome:"Licença de Operação (LO)",tipo:"Licença ambiental · INEA",vencimento:addDias(75),dias:75,status:"ativo"});
  else if (d.licenca==="vencida") docs.push({nome:"Licença de Operação (LO)",tipo:"Licença ambiental · INEA",vencimento:addDias(-30),dias:-30,status:"ativo"});
  else docs.push({nome:"Licença de Operação (LO)",tipo:"Licença ambiental · INEA",vencimento:null,dias:null,status:"pendente"});

  (a.residuosClassificados||[]).forEach(r => {
    if (r.classe==="Classe I" || r.classe==="Classe II-A") {
      docs.push({nome:`MTR — ${r.tipo}`,tipo:"Manifesto de Transporte · SINIR/INEA",vencimento:r.mtr?addDias(25):null,dias:r.mtr?25:null,status:r.mtr?"ativo":"pendente"});
    }
  });
  if (d.captaAgua==="sim") docs.push({nome:"Outorga de uso de água",tipo:"ANA / INEA",vencimento:null,dias:null,status:"pendente"});
  docs.push({nome:"PGRS — Plano de Gerenciamento de Resíduos",tipo:"PNRS · revisão anual",vencimento:addDias(180),dias:180,status:"ativo"});
  if (d.cert==="iso14001") docs.push({nome:"Certificado ISO 14001",tipo:"Certificação · recertificação trienal",vencimento:addDias(500),dias:500,status:"ativo"});

  return docs.sort((x,y) => {
    if (x.status==="pendente" && y.status!=="pendente") return 1;
    if (y.status==="pendente" && x.status!=="pendente") return -1;
    if (x.dias==null) return 1; if (y.dias==null) return -1;
    return x.dias - y.dias;
  });
}

// CHAMADA DE IA — usa tool_use para JSON garantido
// ═══════════════════════════════════════════════════════════════════════════
async function analisarComIA(d) {
  // Chama o backend (Pages Function) — a chave da API fica protegida no servidor
  const res = await fetch("/api/analise", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(d),
  });
  if (!res.ok) {
    let msg = "Erro " + res.status;
    try { const e = await res.json(); msg = e.error + (e.detalhe ? " — " + e.detalhe : ""); } catch {}
    throw new Error(msg);
  }
  const analise = await res.json();
  if (analise.error) throw new Error(analise.error);
  return analise;
}

async function gerarRelatorioIA(d, a, tipo, ctx) {
  // Chama o backend (Pages Function) — a chave fica protegida no servidor
  const res = await fetch("/api/relatorio", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ d, a, tipo, ctx }),
  });
  if (!res.ok) return "Erro ao gerar relatório (" + res.status + ").";
  const data = await res.json();
  if (data.error) return "Erro: " + data.error;
  return data.texto || "Não foi possível gerar.";
}

async function submeterForm() {
  const d = coletarForm();
  if (!d.nome || d.nome==="Empresa") return alert("Preencha o nome da empresa.");
  STATE.dados = d;
  setView("loading");
  let step = 0;
  const iv = setInterval(() => { step=Math.min(4,step+1); updateLoadingStep(step); }, 700);
  try {
    const a = await analisarComIA(d);
    clearInterval(iv);
    STATE.analise = a; STATE.aba="overview"; STATE.relatorio="";
    setView("dash");
  } catch (e) {
    clearInterval(iv);
    setView("form");
    alert("Erro ao processar com IA:\n\n" + e.message);
  }
}

function ctxCalc() {
  const d = STATE.dados, a = STATE.analise;
  const setorKey = d.setor && BENCHMARK.setores[d.setor] ? d.setor : "outro";
  const bench = BENCHMARK.setores[setorKey];
  const deltaBench = a.scoreTotal - bench.media;
  const percentil = Math.max(5, Math.min(95, Math.round(50 + deltaBench*1.8)));
  const conformidade = calcularConformidade(d, a);
  const conformidadePct = Math.round((conformidade.filter(c=>c.status==="ok").length / conformidade.length)*100);
  const documentos = calcularDocumentos(d, a);
  const hist = DB.getAll().filter(h => slug(h.nome)===slug(d.nome)).sort((x,y)=>x.data.localeCompare(y.data));
  const anterior = hist.length>0 ? hist[hist.length-1] : null;
  const trendScore = anterior ? a.scoreTotal - anterior.scoreTotal : null;
  return { bench, deltaBench, percentil, conformidade, conformidadePct, documentos, hist, anterior, trendScore };
}

function cardHTML(lbl, val, sub, color, trend) {
  const big = String(val).length>6;
  const tr = trend!=null ? `<span style="font-size:11px;font-weight:700;margin-left:6px;color:${trend>0?C.verde:trend<0?C.verm:C.cinzaClaro}">${trend>0?"▲":trend<0?"▼":"—"} ${Math.abs(trend)}</span>` : "";
  return `<div class="card"><div class="lbl">${lbl}</div><div class="val ${big?"sm":""}" style="color:${color||C.tinta}">${val}${tr}</div>${sub?`<div class="sub">${sub}</div>`:""}</div>`;

function ringHTML(score, color, label) {

}
function drawRing(id, score, color) {
  const c = document.getElementById(id); if (!c) return;
  const ctx = c.getContext("2d"); const cx=40,cy=40,r=32;
  ctx.clearRect(0,0,80,80);
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.strokeStyle="#f0f0ec"; ctx.lineWidth=6; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+(score/100)*Math.PI*2); ctx.strokeStyle=color; ctx.lineWidth=6; ctx.lineCap="round"; ctx.stroke();
  ctx.fillStyle=color; ctx.font="bold 16px Inter,sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(score,cx,cy-4);
  ctx.fillStyle=C.cinzaClaro; ctx.font="9px Inter,sans-serif"; ctx.fillText("/100",cx,cy+9);
}

        <div><div style="font-size:9px;font-weight:700;color:#ccc;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px">Impacto</div><div style="font-size:12px;color:#555;line-height:1.4">${esc(x.impacto)}</div></div>
        <div><div style="font-size:9px;font-weight:700;color:#ccc;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px">Investimento</div><div style="font-size:12px;color:#555;line-height:1.4">${esc(x.custo)}</div></div>
        <div><div style="font-size:9px;font-weight:700;color:#ccc;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px">Retorno</div><div style="font-size:12px;color:${x.retorno?C.verdeEsc:"#999"};line-height:1.4;font-weight:${x.retorno?600:400}">${esc(x.retorno||"Conformidade / redução de risco")}</div></div>
      </div>
    </div>`).join("")}`;
  }

  if (aba==="documentos") {
    const docs = cx.documentos;
    return `
    <div class="cards">
      ${cardHTML("Documentos", docs.length, "monitorados")}
      ${cardHTML("Vencendo", docs.filter(x=>x.dias!=null&&x.dias>=0&&x.dias<=90).length, "próximos 90 dias", C.ambar)}
      ${cardHTML("Vencidos", docs.filter(x=>x.dias!=null&&x.dias<0).length, "ação imediata", C.verm)}
      ${cardHTML("Pendentes", docs.filter(x=>x.status==="pendente").length, "a emitir", C.azul)}
    </div>
    <div class="box" style="padding:0;overflow:hidden">
      <div style="padding:12px 16px;border-bottom:1px solid #f0f0ec;font-size:13px;font-weight:700">Gestão de documentos e prazos <span style="font-size:11px;font-weight:400;color:${C.cinzaClaro};margin-left:8px">licenças, manifestos e obrigações com validade</span></div>
      ${docs.map((doc,i)=>{
        const cor = doc.status==="pendente"?C.azul:doc.dias==null?C.cinza:doc.dias<0?C.verm:doc.dias<=90?C.ambar:C.verde;
        const dir = doc.status==="pendente"?`<span style="font-size:11px;font-weight:700;color:${C.azul}">A emitir</span>`
          :doc.dias==null?`<span style="font-size:11px;color:${C.cinzaClaro}">Sem prazo</span>`
          :`<div style="font-size:12px;font-weight:700;color:${cor}">${doc.dias<0?`Vencido há ${Math.abs(doc.dias)}d`:`${doc.dias} dias`}</div><div style="font-size:10px;color:${C.cinzaClaro}">${fmtData(doc.vencimento)}</div>`;
        return `<div style="display:flex;gap:12px;align-items:center;padding:12px 16px;${i<docs.length-1?"border-bottom:.5px solid #f5f5f2":""}">
          <div style="width:8px;height:8px;border-radius:50%;background:${cor};flex-shrink:0"></div>
          <div style="flex:1"><div style="font-size:13px;font-weight:600">${esc(doc.nome)}</div><div style="font-size:11px;color:${C.cinza};margin-top:1px">${esc(doc.tipo)}</div></div>
          <div style="text-align:right">${dir}</div>
        </div>`;
      }).join("")}
    </div>
    <div style="background:var(--azul-claro);border:1px solid rgba(55,138,221,.2);border-radius:10px;padding:11px 14px;font-size:11px;color:var(--azul-esc);line-height:1.6;margin-top:12px"><strong>Valor recorrente:</strong> no monitoramento contínuo, a plataforma alerta antes de cada vencimento — evitando multas e perda de licenças. Este é o gancho da mensalidade.</div>`;
  }

  if (aba==="monitoramento") {
    if (cx.hist.length<2) {
      return `<div class="box" style="padding:40px 24px;text-align:center">
        <div style="font-size:30px;opacity:.25;margin-bottom:10px">📈</div>
        <div style="font-size:15px;font-weight:700;margin-bottom:6px">Monitoramento contínuo</div>
        <div style="font-size:12px;color:${C.cinza};line-height:1.6;max-width:420px;margin:0 auto">Este é o produto recorrente. A cada diagnóstico salvo desta empresa, a evolução do score, das emissões e da conformidade aparece aqui — transformando o diagnóstico pontual em acompanhamento mensal.${cx.hist.length===1?`<div style="margin-top:10px;color:${C.verde};font-weight:600">1 diagnóstico salvo. Salve um novo mais adiante para ver a evolução.</div>`:""}</div>
      </div>`;
    }
    return `
    <div class="cards">
      ${cardHTML("Score atual", a.scoreTotal, "vs. anterior", sc, cx.trendScore)}
      ${cardHTML("Diagnósticos", cx.hist.length, "no histórico")}
      ${cardHTML("Carbono", a.co2Total, "tCO₂e/ano", C.verm, cx.anterior?cx.anterior.co2Total-a.co2Total:null)}
      ${cardHTML("Conformidade", cx.conformidadePct+"%", "requisitos", C.verde, cx.anterior?cx.conformidadePct-(cx.anterior.conformidadePct||0):null)}
    </div>
    <div class="box" style="margin-bottom:12px"><div class="sec-label">Evolução do score ESG</div><div style="position:relative;height:200px"><canvas id="chartEvolucao"></canvas></div></div>
    <div class="box" style="padding:0;overflow:hidden">
      <div style="padding:10px 16px;border-bottom:1px solid #f0f0ec;font-size:12px;font-weight:700">Linha do tempo</div>
      ${[...cx.hist].reverse().map((h,i)=>`<div style="display:flex;gap:12px;align-items:center;padding:10px 16px;${i<cx.hist.length-1?"border-bottom:.5px solid #f5f5f2":""}"><div style="font-size:11px;color:${C.cinza};width:90px;flex-shrink:0">${fmtData(h.data)}</div><div style="flex:1;display:flex;gap:14px;flex-wrap:wrap;font-size:12px"><span>Score: <strong style="color:${scoreColor(h.scoreTotal)}">${h.scoreTotal}</strong></span><span style="color:#888">E:${h.scoreE} S:${h.scoreS} G:${h.scoreG}</span><span style="color:#888">${h.co2Total} tCO₂e</span></div></div>`).join("")}
    </div>`;
  }

  if (aba==="relatorio") {
    const rt = STATE.relatorioTipo;
    let corpo;
    if (STATE.relatorioGerando) corpo = `<div style="display:flex;flex-direction:column;align-items:center;padding:36px 0;gap:12px;color:${C.cinzaClaro};font-size:13px"><div class="spin-sm"></div>IA redigindo ${rt==="cliente"?"declaração de conformidade":"relatório executivo"}...</div>`;
    else if (STATE.relatorio) corpo = `<div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #f0f0ec;flex-wrap:wrap;gap:8px"><div style="font-size:14px;font-weight:700">${rt==="cliente"?"Declaração de conformidade ESG":"Relatório ESG executivo"}</div><button class="btn-dark" style="border-color:var(--borda);background:#fafaf8;color:${C.cinza}" onclick="copiarRelatorio()">⧉ Copiar</button></div><div style="font-size:13px;line-height:1.9;color:#333">${STATE.relatorio.split("\n\n").filter(p=>p.trim()).map(p=>`<p style="margin-bottom:12px">${esc(p.trim())}</p>`).join("")}</div></div>`;
    else corpo = `<div style="display:flex;flex-direction:column;align-items:center;padding:36px 0;gap:10px;color:#ccc;font-size:13px;text-align:center"><div style="font-size:26px;opacity:.3">✦</div><div>Escolha um tipo de relatório acima para gerar com IA</div></div>`;
    return `
    <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap">
      <div style="flex:1;min-width:220px;background:#fff;border:1px solid ${rt==="executivo"?C.verde:"var(--borda)"};border-radius:12px;padding:16px">
        <div style="font-size:13px;font-weight:700;margin-bottom:4px">Relatório executivo</div>
        <div style="font-size:11px;color:${C.cinza};line-height:1.5;margin-bottom:10px">Análise interna completa por pilar, riscos e próximos passos. Para uso da consultoria/gestão.</div>
        <button class="btn-primary" style="width:auto;padding:7px 14px;font-size:12px;font-weight:700" onclick="fazerRelatorio('executivo')">✦ Gerar</button>
      </div>
      <div style="flex:1;min-width:220px;background:#fff;border:1px solid ${rt==="cliente"?C.azul:"var(--borda)"};border-radius:12px;padding:16px">
        <div style="font-size:13px;font-weight:700;margin-bottom:4px">Declaração para o cliente ⭐</div>
        <div style="font-size:11px;color:${C.cinza};line-height:1.5;margin-bottom:10px">Documento que a empresa apresenta ao comprador que exige ESG dela. ${BENCHMARK.geral.exigemFornecedor}% cobram ESG de fornecedores.</div>
        <button class="btn-primary" style="width:auto;padding:7px 14px;font-size:12px;font-weight:700;background:${C.azul}" onclick="fazerRelatorio('cliente')">✦ Gerar declaração</button>
      </div>
    </div>
    <div class="box" style="min-height:200px">${corpo}</div>`;
  }
  return "";
}

// ─── CHARTS ──────────────────────────────────────────────────────────────────
let _charts = {};
function renderCharts(aba, a, cx) {
  if (typeof Chart==="undefined") return;
  const mk = (id, config) => {
    const el = document.getElementById(id); if (!el) return;
    if (_charts[id]) _charts[id].destroy();
    _charts[id] = new Chart(el, config);
  };
  if (aba==="carbono") {
    mk("chartEscopo", { type:"bar", data:{ labels:["Escopo 1","Escopo 2"], datasets:[{ data:[a.co2Escopo1,a.co2Escopo2], backgroundColor:["#E24B4A","#EF9F27"], borderRadius:6, borderSkipped:false }] }, options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false}, tooltip:{callbacks:{label:v=>` ${v.raw} tCO₂e`}} }, scales:{ x:{grid:{display:false}}, y:{grid:{color:"#f5f5f2"}} } } });
    const t = a.co2Total, meta = a.meta2030||Math.round(t*.65);
    mk("chartTraj", { type:"bar", data:{ labels:["Atual","2027*","2028*","2030*"], datasets:[{ data:[t,Math.round(t*.88),Math.round(t*.77),meta], backgroundColor:["#E24B4A","#5DCAA5","#2DB98A","#1D9E75"], borderRadius:4, borderSkipped:false }] }, options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false},tooltip:{callbacks:{label:v=>` ${v.raw} tCO₂e`}}}, scales:{x:{grid:{display:false}},y:{grid:{color:"#f5f5f2"}}} } });
  }
  if (aba==="monitoramento" && cx.hist.length>=2) {
    mk("chartEvolucao", { type:"line", data:{ labels:cx.hist.map(h=>fmtData(h.data)), datasets:[
      { label:"Score total", data:cx.hist.map(h=>h.scoreTotal), borderColor:"#1D9E75", backgroundColor:"rgba(29,158,117,.12)", tension:.3, fill:true, borderWidth:2 },
      { label:"Ambiental", data:cx.hist.map(h=>h.scoreE), borderColor:"#1D9E75", borderDash:[4,4], tension:.3, borderWidth:1, pointRadius:2 },
      { label:"Social", data:cx.hist.map(h=>h.scoreS), borderColor:"#378ADD", borderDash:[4,4], tension:.3, borderWidth:1, pointRadius:2 },
      { label:"Governança", data:cx.hist.map(h=>h.scoreG), borderColor:"#7F77DD", borderDash:[4,4], tension:.3, borderWidth:1, pointRadius:2 },
    ]}, options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:"bottom",labels:{boxWidth:10,font:{size:10}}}}, scales:{y:{min:0,max:100,grid:{color:"#f5f5f2"}},x:{grid:{display:false}}} } });
  }
}

// ─── AÇÕES ───────────────────────────────────────────────────────────────────
function salvarDiag() {
  const d = STATE.dados, a = STATE.analise, cx = ctxCalc();
  DB.save({ nome:d.nome, setor:d.setor, cidade:d.cidade, data:hoje(), scoreTotal:a.scoreTotal, scoreE:a.scoreE, scoreS:a.scoreS, scoreG:a.scoreG, co2Total:a.co2Total, conformidadePct:cx.conformidadePct });
  const btn = document.getElementById("btn-salvar");
  if (btn) { btn.textContent="✓ Salvo"; btn.style.background=C.verde; btn.style.color="#fff"; setTimeout(()=>{ btn.textContent="⬇ Salvar"; btn.style.background="#2a2a2a"; btn.style.color="#ccc"; }, 2500); }
}
function novoCliente() { STATE.dados=null; STATE.analise=null; STATE.aba="overview"; STATE.relatorio=""; STATE.residuos=[0,1]; STATE.nextId=2; setView("form"); }

async function fazerRelatorio(tipo) {
  STATE.relatorioTipo=tipo; STATE.relatorio=""; STATE.relatorioGerando=true; renderDash();
  const cx = ctxCalc();
  try { STATE.relatorio = await gerarRelatorioIA(STATE.dados, STATE.analise, tipo, cx); }
  catch(e) { STATE.relatorio = "Erro: "+e.message; }
  STATE.relatorioGerando=false; renderDash();
}
function copiarRelatorio() { navigator.clipboard?.writeText(STATE.relatorio); }

// ─── MODAL DE HISTÓRICO ──────────────────────────────────────────────────────
function abrirHistorico() {
  const hist = DB.getAll();
  const porEmp = {};
  hist.forEach(h => { const k=slug(h.nome); if (!porEmp[k]||h.data>porEmp[k].data) porEmp[k]=h; });
  const emps = Object.values(porEmp).sort((a,b)=>b.data.localeCompare(a.data));
  const modal = document.createElement("div");
  modal.className = "modal-bg"; modal.id = "modal-hist";
  modal.onclick = (e) => { if (e.target===modal) modal.remove(); };
  modal.innerHTML = `<div class="modal">
    <div style="padding:16px 20px;border-bottom:1px solid var(--borda);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff">
      <div style="font-size:15px;font-weight:700">Clientes salvos</div>
      <button style="font-size:18px;background:transparent;border:none;cursor:pointer;color:${C.cinza}" onclick="document.getElementById('modal-hist').remove()">✕</button>
    </div>
    <div style="padding:16px">
      ${emps.length===0 ? `<div style="text-align:center;padding:30px;color:${C.cinzaClaro};font-size:13px">Nenhum cliente salvo ainda.</div>`
      : emps.map(h=>{
        const n = hist.filter(x=>slug(x.nome)===slug(h.nome)).length;
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border:1px solid var(--borda);border-radius:10px;margin-bottom:8px;background:#fafaf8">
          <div><div style="font-size:13px;font-weight:700">${esc(h.nome)}</div><div style="font-size:11px;color:${C.cinza};margin-top:2px">${esc(h.cidade||"—")} · último: ${fmtData(h.data)} · ${n} diagnóstico${n>1?"s":""}</div></div>
          <div style="text-align:right"><div style="font-size:20px;font-weight:800;color:${scoreColor(h.scoreTotal)}">${h.scoreTotal}</div><div style="font-size:9px;color:${C.cinzaClaro}">/100</div></div>
        </div>`;
      }).join("")}
    </div>
  </div>`;
  document.body.appendChild(modal);
}

// ─── ROTEADOR ────────────────────────────────────────────────────────────────
function render() {
  if (STATE.view==="form") renderForm();
  else if (STATE.view==="loading") renderLoading();
  else if (STATE.view==="dash") renderDash();
}

// Inicialização
render();
</script>
</body>
</html>
